# Angular frontend pack — manifest.
# Framework specialization of the frontend axis. Composes ON TOP of packs/frontend/generic
# (installed first) and overlays the UX reviewer with an Angular-aware version — last wins.

pack:
  id: angular
  axis: frontend
  name: "Frontend (Angular)"
  version: "0.1.0"

provides:
  agents:
    - agents/ux-reviewer.md    # Angular-aware UX review — replaces the generic reviewer

overlays:
  - { src: agents/ux-reviewer.md, dest: .claude/agents/ux-reviewer.md }

requires: {}
