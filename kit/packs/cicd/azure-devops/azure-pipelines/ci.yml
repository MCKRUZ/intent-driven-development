# CI rail (the-rails.md §3): build + test + lint + coverage, plus the spec-gate — the mechanical,
# deterministic gate. HARD BLOCK. Nothing here calls an LLM; it answers only what a machine can answer
# definitively (does it compile, do the tests pass, is coverage met, does a source PR carry its spec).
# Consumes the stack pack's ci-profile.yaml via the templates below (setup-toolchain +
# restore-build-test) — no stack commands are hard-coded as policy in this file. The templates carry
# `<<CI_*>>` tokens the installer fills at compose time from the selected stack pack's ci-profile
# joined with this pack's toolchain_map (pack.yaml); the install FAILS CLOSED on an unfilled token.
#
# HOW IT BLOCKS ON AZURE: for Azure Repos, `pr:` YAML triggers are ignored — PR runs are driven by a
# **build validation branch policy**. scripts/configure-branch-policies.sh registers this pipeline
# ("build-and-test") as a REQUIRED (blocking) build validation on the protected branch; a red run there
# is what stops the merge. It also runs on push to the protected branch (the `trigger:` below) to feed
# deploy-dev.
#
# ── PLACEHOLDERS (adapt per repo, then delete this block) ──────────────────────
#   <<DEFAULT_BRANCH>>          protected branch (reference: main).
#   <<VARIABLE_GROUP>>          variable group (ideally Key-Vault-backed) — only needed if you keep the
#                               eval-gate stage or wire secrets; the mechanical stage needs none.
#   <<SPEC_GATE_SRC_RE>>        regex for what counts as source in the spec-gate stage (default: ^src/).
#                               A PR matching it must carry a committed spec in its diff.
#   <<SERVICE_PROVISIONING>>    a `services`/sidecar container + schema/seed if integration tests need a
#                               DB/cache/broker. Azure Pipelines runs service containers differently from
#                               GitHub; the reference shows a Postgres sidecar. DELETE if not needed.
#   <<EVAL_TEST_PROJECT>>       the test project holding the eval fixtures, for the optional agentic
#                               eval-fixture hard gate. Keep only if you ship agent behavior that must
#                               not regress; else delete the eval-gate stage. (The eval FILTER is NOT a
#                               repo blank — it is the seam «ci-profile.eval_gate.test_filter».)
#
# NOT placeholders any more — these are STACK SEAMS the installer fills from ci-profile.yaml:
#   the toolchain + its version, the restore/build/test/lint commands (which carry the repo's own
#   {{SOLUTION_OR_PROJECT}} blank inside them), and the coverage floor.
# ───────────────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main                    # <<DEFAULT_BRANCH>> — push builds feed deploy-dev; PR builds come from the branch policy
pr: none                        # Azure Repos PR runs are driven by the build-validation policy, not by `pr:`

pool:
  vmImage: 'ubuntu-latest'

stages:
  # ── spec-gate ─────────────────────────────────────────────────────────────────────
  # "No spec, no build" (the-rails.md §2), enforced deterministically. The grader only WARNS when a PR
  # carries no committed spec (grader.yml); this stage BLOCKS: a source change with no spec in the diff
  # is a fact, and facts block. A red stage fails the whole build-validation run, which is what blocks
  # the merge on Azure Repos. The recorded escape is the `no-spec:chore` PR label + the reason in the
  # PR description.
  # PR-context only: this pipeline also runs on push to the protected branch (the `trigger:` above) to
  # feed deploy-dev — those runs have no PR to judge or read labels from, so the stage skips cleanly
  # (Build.Reason is only 'PullRequest' on build-validation runs; a skipped stage does not fail the run).
  - stage: spec_gate
    displayName: 'spec-gate'
    dependsOn: []                   # parallel to build_and_test — no reason to serialize the two gates
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: spec_gate
        displayName: 'spec-gate'
        steps:
          - template: templates/checkout-with-base.yml   # full history + fetches the PR target branch, sets $(baseRef)

          - bash: |
              set -euo pipefail
              # Recorded escape: the `no-spec:chore` PR label (for chores that genuinely need no spec).
              # Azure DevOps puts no labels in the pipeline context, so read them from the REST API with
              # the pipeline's own $(System.AccessToken) — the same pattern as scripts/post-pr-thread.sh.
              # Endpoint verified against Microsoft Learn ("Pull Request Labels - List", api-version 7.1):
              #   GET {org}/{project}/_apis/git/repositories/{repositoryId}/pullRequests/{pullRequestId}/labels
              #   → WebApiTagDefinition[] — objects with {id, name, active, url}, wrapped as {count, value}.
              if [ -z "${SYSTEM_ACCESSTOKEN:-}" ]; then
                echo "##vso[task.logissue type=warning]System.AccessToken not mapped — cannot check the no-spec:chore exemption label; the gate proceeds without the escape."
              else
                LABELS_URL="${ORG_URL%/}/${PROJECT}/_apis/git/repositories/${REPO_ID}/pullRequests/${PR_ID}/labels?api-version=7.1"
                LABELS_JSON="$(curl -sf -H "Authorization: Bearer ${SYSTEM_ACCESSTOKEN}" "$LABELS_URL" || echo '{}')"
                if printf '%s' "$LABELS_JSON" | jq -e '(.value // .)[]? | select(.name == "no-spec:chore")' >/dev/null; then
                  echo "NOTICE: 'no-spec:chore' label present — spec-gate exemption recorded for this PR. State the reason in the PR description."
                  exit 0
                fi
              fi
              changed="$(git diff --name-only "origin/${BASE_REF}...HEAD")"
              source_touched="$(printf '%s\n' "$changed" | grep -E "$SRC_RE" || true)"
              # New-or-modified spec files in this PR's diff (not deleted).
              # KEEP IN SYNC: this is the SAME regex grader.yml uses to identify the
              # committed spec file — change one, change both.
              spec_in_diff="$(git diff --name-only --diff-filter=d "origin/${BASE_REF}...HEAD" -- "${SPEC_DIR}/" \
                | grep -E "^${SPEC_DIR}/[0-9]+.*\.md$" || true)"
              if [ -n "$source_touched" ] && [ -z "$spec_in_diff" ]; then
                echo "##vso[task.logissue type=error]No spec, no build — this PR touches source but carries no committed spec."
                echo "Source files touched (match SRC_RE '${SRC_RE}'):"
                printf '%s\n' "$source_touched" | sed 's/^/  - /'
                echo "No ${SPEC_DIR}/NNNN-*.md file is in this PR's diff."
                echo "To comply: add or update the spec for this change under ${SPEC_DIR}/ so it rides in this PR."
                echo "Recorded escape: apply the 'no-spec:chore' label and state the reason in the PR description."
                exit 1
              fi
              if [ -z "$source_touched" ]; then
                echo "OK: not a source PR (nothing matches SRC_RE '${SRC_RE}') — spec-gate does not apply."
              else
                echo "OK: spec present in the diff: $(printf '%s\n' "$spec_in_diff" | head -n1)"
              fi
            displayName: 'Require a spec in the diff for source changes'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)      # allow the OAuth token in the pipeline settings
              ORG_URL: $(System.CollectionUri)
              PROJECT: $(System.TeamProject)
              REPO_ID: $(Build.Repository.ID)
              PR_ID: $(System.PullRequest.PullRequestId)
              BASE_REF: $(baseRef)                            # set by checkout-with-base.yml
              SRC_RE: '^src/'                                 # <<SPEC_GATE_SRC_RE>> — what counts as source
              SPEC_DIR: 'specs'                               # <<SPEC_DIR>> — same directory grader.yml reads

  - stage: build_and_test
    displayName: 'build-and-test'   # <-- register this pipeline as a REQUIRED build validation policy
    dependsOn: []                   # explicit: run in parallel with spec_gate, not after it
    jobs:
      - job: build_and_test
        displayName: 'build-and-test'
        # <<SERVICE_PROVISIONING>> — Azure Pipelines can run sidecar service containers on a container job.
        # The reference shows Postgres. DELETE this `services:`/schema step pairing if not needed.
        # services:
        #   database: postgres16
        # container: {}   # a container job is required to attach `services`; see RAILS.md.
        variables:
          # Setting this both points tests at the service AND (by convention) makes the fixture fail hard
          # on a bad connection rather than skip. <<SERVICE_PROVISIONING>>
          TEST_DB_CONN: 'Host=localhost;Port=5432;Database=appdb;Username=appdb;Password=appdb'
        steps:
          # Secret scan (hard gate) — a committed credential is a fact; facts block.
          # Runs first: it needs no toolchain and a hit invalidates everything after it.
          # The binary is version- AND checksum-pinned (the standard's supply-chain rule:
          # no @latest, no unverified downloads). Scans the checked-out tree; history
          # scanning is a one-time onboarding task, not a per-PR gate.
          - bash: |
              set -euo pipefail
              curl -fsSL -o gitleaks.tar.gz \
                https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
              echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tar.gz" | sha256sum -c -
              tar -xzf gitleaks.tar.gz gitleaks
              ./gitleaks dir . --no-banner --redact
              rm -f gitleaks gitleaks.tar.gz
            displayName: 'Secret scan (gitleaks)'

          - template: templates/setup-toolchain.yml         # ci-profile.toolchain via toolchain_map

          # <<SERVICE_PROVISIONING>> — apply schema/seed once the service is healthy. Service containers do
          # not run an image's init scripts. DELETE if no external service.
          # - bash: |
          #     set -euo pipefail
          #     for f in db/init/*.sql; do
          #       PGPASSWORD=appdb psql -h localhost -p 5432 -U appdb -d appdb -v ON_ERROR_STOP=1 -f "$f"
          #     done
          #   displayName: 'Apply database schema'

          # ci-profile.commands + coverage.floor_percent. Both defaults come from the stack pack via
          # the template's own seam tokens, so this site passes no parameters.
          - template: templates/restore-build-test.yml

  # ── OPTIONAL: eval-gate ─────────────────────────────────────────────────────────
  # A second HARD gate for repos that ship agentic behavior with an eval-fixture suite that must not
  # regress (the source repo's "OWASP Agentic Top-10 Gate"). Realized from ci-profile.eval_gate. Any
  # failing fixture exits non-zero and BLOCKS the merge. A legitimate, time-boxed bypass is RECORDED in a
  # ledger (the gate still runs; the ledger documents why a known failure was accepted).
  # DELETE this whole stage if you have no such suite. If you keep it, register it as a REQUIRED build
  # validation policy too (branch-policies.json).
  - stage: eval_gate
    displayName: 'eval-gate'
    dependsOn: build_and_test
    condition: succeeded()
    jobs:
      - job: eval_gate
        displayName: 'eval-gate'
        steps:
          - template: templates/setup-toolchain.yml
          - script: |
              <<CI_RESTORE_CMD>>
            displayName: 'Restore'
            # «stack pack: ci-profile.commands.restore»
          - script: |
              <<CI_BUILD_CMD>>
            displayName: 'Build'
            # «stack pack: ci-profile.commands.build»
          # PARTIAL SEAM (known gap, mirrors the github twin): the FILTER binds to the stack pack,
          # but the runner invocation around it is written in .NET's vocabulary — ci-profile declares
          # no eval-runner command, only the filter. This stage is already hand-adapted per repo (it
          # carries <<EVAL_TEST_PROJECT>> and is kept only when ci-profile.eval_gate.enabled is true,
          # which the .NET reference sets to false), so a non-.NET stack rewrites these flags.
          - script: |
              dotnet test <<EVAL_TEST_PROJECT>> \
                --no-build \
                --configuration Release \
                --filter "<<CI_EVAL_TEST_FILTER>>" \
                --logger "trx;LogFileName=eval-gate.trx" \
                --results-directory $(Agent.TempDirectory)/eval-results
            displayName: 'Run eval fixtures (hard gate)'
            # «stack pack: ci-profile.eval_gate.test_filter» fills the --filter above.
          - task: PublishPipelineArtifact@1
            displayName: 'Upload eval results'
            condition: always()
            inputs:
              targetPath: '$(Agent.TempDirectory)/eval-results'
              artifact: 'eval-gate-results'
