# Python / uv stack pack — manifest.
# Realizes the core kit's <<...>> / {{STACK}} blanks for a Python repo built with uv.
# Read by the profile-aware installer to overlay this pack after the core.
# Selected by a profile declaring stack.backend.language: python (e.g. the creative-tooling profile,
# which pairs it with framework: uv-scripts and testing: pytest).

pack:
  id: python
  axis: stack
  name: "Python 3.13 / uv"
  version: "0.1.0"

# What this pack provides to the composition.
provides:
  claude_standards: claude/stack-standards.md   # fills CLAUDE.md "Stack standards — {{STACK}}"
  rules:                                          # the @imports the core CLAUDE.md references
    - rules/project-structure.md
    - rules/testing.md
  skills:
    - skills/api-pattern-python
  ci_profile: ci-profile.yaml                     # the command interface a CI/CD pack consumes
  settings_fragment: settings.fragment.json       # Python tooling perms, merged into settings.json
  # NO mcp_fragment: there is no Python-specific MCP server worth pinning. The .NET pack contributes
  # microsoft-learn because that server is genuinely stack-specific; Python's equivalent need is
  # already met by the core's context7 (version-specific library API reference). Shipping an empty
  # fragment to mirror the reference's shape would be cargo cult — the key is omitted instead.

# Overlay map: pack-relative source -> repo destination. `merge: true` means the installer
# deep-merges JSON rather than overwriting (dicts merge key-wise, lists concatenate and
# dedup), so core + pack permissions combine and core entries survive.
overlays:
  - { src: rules/project-structure.md,           dest: .claude/rules/project-structure.md }
  - { src: rules/testing.md,                     dest: .claude/rules/testing.md }
  - { src: skills/api-pattern-python/SKILL.md,   dest: .claude/skills/api-pattern-python/SKILL.md }
  - { src: settings.fragment.json,               dest: .claude/settings.json, merge: true }

# Consumed by CI/CD packs; not installed directly as files.
exposes:
  ci_commands: ci-profile.yaml

# Requires a CI/CD pack to realize the pipeline. Any of these satisfies it. Reciprocal of each CI/CD
# pack's requires_stack_pack, which already lists `python`. Both packs' toolchain_map also map the
# `python` toolchain id this pack's ci-profile declares, so either pairing installs closed.
requires_cicd_pack: [github, azure-devops]
